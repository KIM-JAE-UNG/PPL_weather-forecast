*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:-apple-system,'Segoe UI',sans-serif;background:#0d1117;overflow:hidden;}
#map{position:absolute;top:0;left:0;right:0;bottom:104px;}
.title-badge{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(13,17,23,0.7);backdrop-filter:blur(10px);color:#e6edf3;padding:7px 18px;border-radius:20px;font-size:13px;font-weight:600;text-align:center;border:1px solid rgba(255,255,255,0.08);}

.legend-item{display:flex;align-items:center;gap:5px;margin:2px 0;}
.legend-color{width:14px;height:8px;border-radius:2px;}

.layer-btn.on{color:#58a6ff;border-color:#1f6feb;}

.time-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.time-display{font-size:14px;font-weight:600;}
.fhour{font-size:11px;color:#58a6ff;font-weight:500;}
.controls{display:flex;align-items:center;gap:12px;}
.play-btn{background:#1f6feb;border:none;color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.play-btn svg{width:14px;height:14px;}

.tab-bar{position:absolute;bottom:0;left:0;right:0;height:56px;z-index:1001;background:rgba(13,17,23,0.95);backdrop-filter:blur(20px);display:flex;border-top:1px solid rgba(255,255,255,0.06);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#6e7681;font-size:10px;cursor:pointer;gap:3px;font-weight:500;}
.tab.active{color:#58a6ff;}
.tab svg{width:21px;height:21px;stroke:currentColor;stroke-width:1.6;fill:none;}

.popup-card .loc{font-size:13px;color:#7d8590;margin-bottom:8px;}
.popup-card .cond{font-size:22px;font-weight:700;margin-bottom:4px;}
.popup-card .detail{font-size:13px;color:#aaa;line-height:1.6;}
.popup-card .close{position:absolute;top:8px;right:12px;color:#6e7681;cursor:pointer;font-size:16px;}

var map = L.map('map',{zoomControl:false,maxBounds:[[META.lat_min,META.lon_min],[META.lat_max,META.lon_max]],maxBoundsViscosity:1.0,minZoom:4}).setView([35,130],5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'CARTO',maxZoom:10}).addTo(map);
var bounds=[[META.lat_min,META.lon_min],[META.lat_max,META.lon_max]];
var pOv=[],wOv=[],current=0,playing=false,timer=null;
var showWind=false;
META.times.forEach(function(t){
  pOv.push(t.data?L.imageOverlay(t.data,bounds,{opacity:0}).addTo(map):null);
  wOv.push(t.wdata?L.imageOverlay(t.wdata,bounds,{opacity:0}).addTo(map):null);
});
document.getElementById('initTime').textContent='기준 '+META.init+' UTC';
function show(idx){
  pOv.forEach(function(o,i){if(o)o.setOpacity(i===idx?0.85:0);});
  wOv.forEach(function(o,i){if(o)o.setOpacity((i===idx&&showWind)?0.8:0);});
  document.getElementById('timeDisplay').textContent=META.times[idx].valid.replace('T',' ');
  document.getElementById('fhour').textContent='+'+META.times[idx].fhour+'h';
  document.getElementById('slider').value=idx;current=idx;}
document.getElementById('slider').addEventListener('input',function(e){show(parseInt(e.target.value));});
var pp='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
var ps='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>';
document.getElementById('playBtn').addEventListener('click',function(){playing=!playing;this.innerHTML=playing?ps:pp;
if(playing){timer=setInterval(function(){show((current+1)%META.times.length);},800);}else{clearInterval(timer);}});
// 레이어 버튼
document.getElementById('btnWind').addEventListener('click',function(){showWind=!showWind;
this.classList.toggle('on',showWind);show(current);});
// 탭
document.querySelectorAll('.tab').forEach(function(tab){tab.addEventListener('click',function(){
document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});this.classList.add('active');});});
// 지역 클릭 → 날씨
function nearest(arr,val){var bi=0,bd=1e9;for(var i=0;i<arr.length;i++){var dd=Math.abs(arr[i]-val);if(dd<bd){bd=dd;bi=i;}}return bi;}
map.on('click',function(e){
  var la=e.latlng.lat, lo=e.latlng.lng;
  if(la<META.grid_lats[0]||la>META.grid_lats[META.grid_lats.length-1]||lo<META.grid_lons[0]||lo>META.grid_lons[META.grid_lons.length-1])return;
  var ii=nearest(META.grid_lats,la), jj=nearest(META.grid_lons,lo);
  var t=META.times[current];
  var pr=t.precip[ii][jj], tp=t.temp[ii][jj];
  var cond = pr>=5?'🌧 강한 비':pr>=1?'🌦 비':pr>=0.1?'☁ 약한 비':'☀ 맑음';
  document.getElementById('popupLoc').textContent=la.toFixed(1)+'°N, '+lo.toFixed(1)+'°E · '+t.valid.replace('T',' ');
  document.getElementById('popupCond').textContent=cond;
  document.getElementById('popupDetail').innerHTML='강수 '+pr+' mm/h<br>기온 '+tp+' °C';
  document.getElementById('popup').style.display='block';});
document.getElementById('popupClose').addEventListener('click',function(){document.getElementById('popup').style.display='none';});
document.getElementById('slider').max=META.times.length-1;show(0);
</script></body></html>
